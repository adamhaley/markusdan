<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Risk-Fast-Check | Kontaktdaten</title>
    <link rel="stylesheet" href="assets/form.css">
    <script defer src="assets/form.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="hero">
          <div class="brand-mark"><img src="assets/md-logo-11.png" alt="Markus Dan"></div>
          <div class="eyebrow">Risk-Fast-Check</div>
          <h1>Risiko-Schnell-Check</h1>
          <p class="lede">All data is anonymous and will not be saved. Alle Angaben sind vertraulich und werden nach der Auswertung gelöscht.</p>
          <div class="progress">
            <div class="progress-meta"><strong>Kontaktdaten</strong><span>1 / 8</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 0%;"></div></div>
          </div>
        </header>
        <form data-step="1" novalidate>
          <div class="field">
            <label for="Field6">E-Mail-Adresse <span class="req">*</span></label>
            <input id="Field6" name="Field6" type="email" required>
          </div>
          <div class="field">
            <label for="Field5">Telefonnummer <span class="req">*</span></label>
            <input id="Field5" name="Field5" type="tel" required>
          </div>
          <input type="hidden" id="Field1430" name="Field1430" data-utm="utm_source">
          <input type="hidden" id="Field1431" name="Field1431" data-utm="utm_medium">
          <input type="hidden" id="Field1435" name="Field1435" data-utm="utm_campaign">
          <input type="hidden" id="Field1434" name="Field1434" data-utm="utm_content">
          <input type="hidden" id="Field1433" name="Field1433" data-utm="utm_term">
          <div class="nav nav-end">
            <button class="button" type="submit" data-next="step-2.html">Nächste Seite</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
