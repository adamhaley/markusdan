<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Risk-Fast-Check | Versicherung</title>
    <link rel="stylesheet" href="assets/form.css?v=20260713b">
    <script defer src="assets/form.js?v=20260713b"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="hero">
          <div class="brand-mark"><img src="assets/md-logo-11.png" alt="Markus Dan"></div>
          <div class="progress">
            <div class="progress-meta"><strong>Versicherung</strong><span>4 / 7</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 57.142%;"></div></div>
          </div>
        </header>
        <form data-step="4" novalidate>
          <div class="video-slot" data-video-slot></div>
          <fieldset class="choice-group" data-required-group="life_insurance_ownership" data-invalid="false">
            <legend>Besitzen Sie Lebensversicherungen als Rentenvorsorge (oder Bausparverträge)? <span class="req">*</span></legend>
            <div class="choices">
              <label class="choice"><input id="Field520" name="life_insurance_ownership" type="radio" value="Ja" data-group="life_insurance_ownership"><span>Ja</span></label>
              <label class="choice"><input id="Field521" name="life_insurance_ownership" type="radio" value="Nein" data-group="life_insurance_ownership"><span>Nein</span></label>
            </div>
            <div class="error">Bitte wählen Sie Ja oder Nein.</div>
          </fieldset>
          <fieldset class="choice-group">
            <legend>Optional: Wie viel zahlen Sie monatlich in diese Lebensversicherung/en ein?</legend>
            <div class="choices">
              <label class="choice"><input id="Field821" name="life_insurance_monthly_payment" type="radio" value="weniger als €100" data-group="life_insurance_monthly_payment"><span>weniger als €100</span></label>
              <label class="choice"><input id="Field822" name="life_insurance_monthly_payment" type="radio" value="€100 - €200" data-group="life_insurance_monthly_payment"><span>€100 - €200</span></label>
              <label class="choice"><input id="Field823" name="life_insurance_monthly_payment" type="radio" value="mehr als €200" data-group="life_insurance_monthly_payment"><span>mehr als €200</span></label>
              <label class="choice"><input id="Field824" name="life_insurance_monthly_payment" type="radio" value="ich weiß es nicht genau" data-group="life_insurance_monthly_payment"><span>ich weiß es nicht genau</span></label>
            </div>
          </fieldset>
          <div class="nav">
            <button class="link-button" type="button" data-prev="step-3.html">Vorherige Seite</button>
            <button class="button" type="submit" data-next="step-5.html">Nächste Seite</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
