<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Risk-Fast-Check | Edelmetalle</title>
    <link rel="stylesheet" href="assets/form.css?v=20260713b">
    <script defer src="assets/form.js?v=20260713c"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="hero">
          <div class="brand-mark"><img src="assets/md-logo-11.png" alt="Markus Dan"></div>
          <div class="progress">
            <div class="progress-meta"><strong>Edelmetalle</strong><span>3 / 7</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 42.857%;"></div></div>
          </div>
        </header>
        <form data-step="3" novalidate>
          <div class="video-slot" data-video-slot></div>
          <fieldset class="choice-group" data-required-group="precious_metals_ownership" data-invalid="false">
            <legend>Do you have precious metals? Besitzen Sie Edelmetalle? <span class="req">*</span></legend>
            <div class="choices">
              <label class="choice"><input id="Field420" name="precious_metals_ownership" type="radio" value="Ja" data-group="precious_metals_ownership"><span>Ja</span></label>
              <label class="choice"><input id="Field421" name="precious_metals_ownership" type="radio" value="Nein" data-group="precious_metals_ownership"><span>Nein</span></label>
            </div>
            <div class="error">Bitte wählen Sie Ja oder Nein.</div>
          </fieldset>
          <fieldset class="choice-group">
            <legend>Optional: Wie viel haben Sie in Edelmetalle investiert? (Goldbarren, Münzen, Silber usw.)</legend>
            <div class="choices">
              <label class="choice"><input id="Field620" name="precious_metals_investment_amount" type="radio" value="weniger als €10.000" data-group="precious_metals_investment_amount"><span>weniger als €10.000</span></label>
              <label class="choice"><input id="Field621" name="precious_metals_investment_amount" type="radio" value="€10.000 - €50.000" data-group="precious_metals_investment_amount"><span>€10.000 - €50.000</span></label>
              <label class="choice"><input id="Field622" name="precious_metals_investment_amount" type="radio" value="€50.000 - €100.000" data-group="precious_metals_investment_amount"><span>€50.000 - €100.000</span></label>
              <label class="choice"><input id="Field623" name="precious_metals_investment_amount" type="radio" value="mehr als €100.000" data-group="precious_metals_investment_amount"><span>mehr als €100.000</span></label>
            </div>
          </fieldset>
          <div class="nav">
            <button class="link-button" type="button" data-prev="step-2.html">Vorherige Seite</button>
            <button class="button" type="submit" data-next="step-4.html">Weiter</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
