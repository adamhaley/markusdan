<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Risk-Fast-Check | Bank</title>
    <link rel="stylesheet" href="assets/form.css?v=20260713b">
    <script defer src="assets/form.js?v=20260713b"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="hero">
          <div class="brand-mark"><img src="assets/md-logo-11.png" alt="Markus Dan"></div>
          <div class="progress">
            <div class="progress-meta"><strong>Bank</strong><span>5 / 7</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 71.428%;"></div></div>
          </div>
        </header>
        <form data-step="5" novalidate>
          <div class="video-slot" data-video-slot></div>
          <fieldset class="choice-group" data-required-group="bank_savings_ownership" data-invalid="false">
            <legend>Do you have money in the bank? Haben Sie Geld auf der Bank? <span class="req">*</span></legend>
            <div class="choices">
              <label class="choice"><input id="Field923" name="bank_savings_ownership" type="radio" value="Ja" data-group="bank_savings_ownership"><span>Ja</span></label>
              <label class="choice"><input id="Field924" name="bank_savings_ownership" type="radio" value="Nein" data-group="bank_savings_ownership"><span>Nein</span></label>
            </div>
            <div class="error">Bitte wählen Sie Ja oder Nein.</div>
          </fieldset>
          <fieldset class="choice-group">
            <legend>Optional: Wie viel Geld haben Sie auf der Bank? (Konto, Bausparer usw.)</legend>
            <div class="choices">
              <label class="choice"><input id="Field1023" name="bank_savings_amount" type="radio" value="weniger als €10.000" data-group="bank_savings_amount"><span>weniger als €10.000</span></label>
              <label class="choice"><input id="Field1025" name="bank_savings_amount" type="radio" value="€10.000 - €50.000" data-group="bank_savings_amount"><span>€10.000 - €50.000</span></label>
              <label class="choice"><input id="Field1026" name="bank_savings_amount" type="radio" value="€50.000 - €100.000" data-group="bank_savings_amount"><span>€50.000 - €100.000</span></label>
              <label class="choice"><input id="Field1024" name="bank_savings_amount" type="radio" value="mehr als €100.000" data-group="bank_savings_amount"><span>mehr als €100.000</span></label>
            </div>
          </fieldset>
          <div class="nav">
            <button class="link-button" type="button" data-prev="step-4.html">Vorherige Seite</button>
            <button class="button" type="submit" data-next="step-6.html">Nächste Seite</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
