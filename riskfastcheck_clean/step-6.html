<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Risk-Fast-Check | Alternative (Sach)Werte</title>
    <link rel="stylesheet" href="assets/form.css?v=20260713b">
    <script defer src="assets/form.js?v=20260713b"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="hero">
          <div class="brand-mark"><img src="assets/md-logo-11.png" alt="Markus Dan"></div>
          <div class="progress">
            <div class="progress-meta"><strong>Alternative (Sach)Werte</strong><span>6 / 7</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 85.714%;"></div></div>
          </div>
        </header>
        <form data-step="6" novalidate>
          <div class="video-slot" data-video-slot></div>
          <fieldset class="choice-group" data-required-group="alternative_assets_ownership" data-invalid="false">
            <legend>Do you have alternative investments? Haben Sie alternative (Sach-)Werte? <span class="req">*</span></legend>
            <div class="choices">
              <label class="choice"><input id="Field1125" name="alternative_assets_ownership" type="radio" value="Ja" data-group="alternative_assets_ownership"><span>Ja</span></label>
              <label class="choice"><input id="Field1126" name="alternative_assets_ownership" type="radio" value="Nein" data-group="alternative_assets_ownership"><span>Nein</span></label>
            </div>
            <div class="error">Bitte wählen Sie Ja oder Nein.</div>
          </fieldset>
          <fieldset class="choice-group">
            <legend>Optional: Wie viel haben Sie in alternative Werte investiert? (Krypto, Oldtimer, usw. - alles was bisher nicht aufgeschienen ist)</legend>
            <div class="choices">
              <label class="choice"><input id="Field1225" name="alternative_assets_investment_amount" type="radio" value="weniger als €10.000" data-group="alternative_assets_investment_amount"><span>weniger als €10.000</span></label>
              <label class="choice"><input id="Field1226" name="alternative_assets_investment_amount" type="radio" value="€10.000 - €50.000" data-group="alternative_assets_investment_amount"><span>€10.000 - €50.000</span></label>
              <label class="choice"><input id="Field1227" name="alternative_assets_investment_amount" type="radio" value="€50.000 - €100.000" data-group="alternative_assets_investment_amount"><span>€50.000 - €100.000</span></label>
              <label class="choice"><input id="Field1228" name="alternative_assets_investment_amount" type="radio" value="mehr als €100.000" data-group="alternative_assets_investment_amount"><span>mehr als €100.000</span></label>
            </div>
          </fieldset>
          <div class="nav">
            <button class="link-button" type="button" data-prev="step-5.html">Vorherige Seite</button>
            <button class="button" type="submit" data-next="step-7.html">Weiter</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
